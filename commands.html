<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yardim | Commands</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; position: relative; padding: 100px 20px; }
        .bg-glow { position: fixed; width: 700px; height: 700px; background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, rgba(0, 210, 255, 0) 70%); filter: blur(100px); z-index: 0; animation: moveGlow 15s infinite alternate ease-in-out; }
        @keyframes moveGlow { 0% { transform: translate(-30%, -30%); } 100% { transform: translate(30%, 30%); } }

        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); padding: 40px; border-radius: 35px; width: 100%; max-width: 800px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.7); position: relative; z-index: 1; }
        
        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 30px; letter-spacing: -1px; }

        .command-list { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        .command-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 18px; transition: 0.3s; }
        .command-item:hover { background: rgba(255, 255, 255, 0.07); border-color: #ffffff; transform: translateX(10px); }
        
        .cmd-name { color: #00d2ff; font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; display: block; }
        .cmd-desc { color: #b0b0b0; font-size: 0.95rem; }

        .back-btn { margin-top: 30px; display: inline-block; padding: 12px 25px; border-radius: 12px; font-weight: 700; text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .back-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #ffffff; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="glass-panel">
        <h1>Bot Commands</h1>
        
        <div class="command-list">
            <div class="command-item">
                <span class="cmd-name">/help</span>
                <p class="cmd-desc">Shows the list of all available commands and support information.</p>
            </div>

            <div class="command-item">
                <span class="cmd-name">/setup</span>
                <p class="cmd-desc">Initialize the support ticket system for your server.</p>
            </div>

            <div class="command-item">
                <span class="cmd-name">/ping</span>
                <p class="cmd-desc">Check the bot's current response latency.</p>
            </div>
            
            </div>

        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </div>
</body>
</html>
