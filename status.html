<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yardım Bot - Sistem Durumu</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .status-card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            font-size: 28px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .status-list {
            list-style: none;
            padding: 0;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .service-name {
            font-size: 18px;
            font-weight: 500;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 14px;
        }
        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px currentColor;
        }
        .online { color: #00ff88; }
        .online .dot { background-color: #00ff88; }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .back-link:hover {
            color: #00ff88;
        }
    </style>
</head>
<body>

    <div class="status-card">
        <h1>Sistem Durumu</h1>
        <div class="status-list">
            <div class="status-item">
                <span class="service-name">Discord Bot</span>
                <div class="status-indicator online"><span class="dot"></span>AKTİF</div>
            </div>
            <div class="status-item">
                <span class="service-name">Fluxer Bot</span>
                <div class="status-indicator online"><span class="dot"></span>AKTİF</div>
            </div>
            <div class="status-item">
                <span class="service-name">API Sunucusu</span>
                <div class="status-indicator online"><span class="dot"></span>AKTİF</div>
            </div>
            <div class="status-item">
                <span class="service-name">Veritabanı</span>
                <div class="status-indicator online"><span class="dot"></span>AKTİF</div>
            </div>
        </div>
        <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
    </div>

</body>
</html>
