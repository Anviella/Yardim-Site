<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yardim | Status Panel</title>
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: 300; 
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
        }
        .stat-value { display: block; font-size: 24px; font-weight: bold; color: #00ff88; }
        .stat-label { font-size: 12px; text-transform: uppercase; color: #aaa; margin-top: 5px; display: block; }
        
        .status-container {
            text-align: center; 
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid #00ff88;
            text-transform: uppercase;
        }
        .discord-badge {
            color: #5865F2; 
            border-color: #5865F2; 
            background: rgba(88, 101, 242, 0.1);
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: white;
            text-decoration: none;
            opacity: 0.5;
            font-size: 13px;
            transition: 0.3s;
        }
        .back-btn:hover { opacity: 1; color: #00ff88; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>System Status</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span id="latency-val" class="stat-value">...</span>
                <span class="stat-label">Latency</span>
            </div>
            <div class="stat-card">
                <span id="ram-val" class="stat-value">...</span>
                <span class="stat-label">RAM Usage</span>
            </div>
            <div class="stat-card">
                <span id="loc-val" class="stat-value">...</span>
                <span class="stat-label">Location</span>
            </div>
            <div class="stat-card">
                <span id="uptime-val" class="stat-value">...</span>
                <span class="stat-label">Uptime</span>
            </div>
        </div>

        <div class="status-container">
            <div id="fluxer-status" class="status-badge">● Fluxer: Checking...</div>
            <div id="discord-status" class="status-badge discord-badge">● Discord: Online</div>
        </div>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <script>
        async function updateStats() {
            try {
                // Kendi Railway URL'ni buraya yapıştır
                const response = await fetch('https://yardim-production.up.railway.app/api/status');
                const data = await response.json();

                // Verileri HTML elementlerine yerleştirme
                document.getElementById('latency-val').innerText = data.latency;
                document.getElementById('ram-val').innerText = data.ramUsage;
                document.getElementById('loc-val').innerText = data.location;
                document.getElementById('uptime-val').innerText = data.uptime;
                
                // Status Badge güncelleme
                document.getElementById('fluxer-status').innerText = `● Fluxer: ${data.fluxer_status}`;
                
                console.log("Stats updated successfully");
            } catch (error) {
                console.error("API Error:", error);
                // Hata durumunda görünecek metinler
                document.getElementById('fluxer-status').innerText = "● Fluxer: Offline";
                document.getElementById('fluxer-status').style.borderColor = "#ff4d4d";
                document.getElementById('fluxer-status').style.color = "#ff4d4d";
            }
        }

        // Sayfa yüklendiğinde çalıştır
        updateStats();
        // 30 saniyede bir güncelle
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
